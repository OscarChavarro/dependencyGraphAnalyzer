<main class="main-layout" [class.main-layout-collapsed]="isPanelCollapsed">
  <aside class="left-panel" [class.left-panel-collapsed]="isPanelCollapsed">
    <button class="panel-toggle-button" type="button" (click)="toggleSidePanel()" [attr.aria-expanded]="!isPanelCollapsed">
      {{ isPanelCollapsed ? '» ' + t(i18nKeys.shell.PANEL_LABEL) : '« ' + t(i18nKeys.shell.PANEL_COLLAPSE) }}
    </button>

    <div class="panel-content" *ngIf="!isPanelCollapsed">
      <div class="panel-header-row">
        <h1 class="panel-title">{{ t(i18nKeys.shell.GRAPH_GENERATOR_TITLE) }}</h1>
        <div class="language-switch" [attr.aria-label]="t(i18nKeys.shell.LANGUAGE_SELECTOR_ARIA)">
          <button
            type="button"
            class="language-flag-button"
            [class.language-flag-button-active]="selectedLanguage() === 'es'"
            (click)="setLanguage('es')"
            aria-label="Spanish"
          >
            🇪🇸
          </button>
          <button
            type="button"
            class="language-flag-button"
            [class.language-flag-button-active]="selectedLanguage() === 'en'"
            (click)="setLanguage('en')"
            aria-label="English"
          >
            🇺🇸
          </button>
        </div>
      </div>

      <button class="action-button" type="button" (click)="createGraphFromCache()" [disabled]="isLoading">
        {{ t(i18nKeys.shell.CREATE_GRAPH_FROM_CACHE) }}
      </button>

      <button class="action-button" type="button" (click)="analyzeDebianSystem()" [disabled]="isLoading">
        {{ t(i18nKeys.shell.ANALYZE_DEBIAN_SYSTEM) }}
      </button>

      <button class="action-button" type="button" (click)="analyzeRenderparkCppSources()" [disabled]="isLoading">
        {{ t(i18nKeys.shell.ANALYZE_CPP_SOURCES_RENDERPARK) }}
      </button>

      <button class="action-button" type="button" (click)="backToStructure()" *ngIf="!isInStructureMode()">
        {{ t(i18nKeys.shell.BACK_TO_STRUCTURE) }}
      </button>


      <p class="status-line" *ngIf="isLoading">{{ t(i18nKeys.shell.PROCESSING) }}</p>
      <p class="status-line status-line-error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="status-line" *ngIf="graphModel">
        {{ t(i18nKeys.shell.NODES) }}: {{ graphModel.nodes.length }} | {{ t(i18nKeys.shell.EDGES) }}:
        {{ graphModel.edges.length }}
      </p>

      <section class="node-browser-panel">
        <label class="node-browser-search" aria-label="Filtrar nodos del grupo">
          <span class="node-browser-search-icon">🔍</span>
          <input
            type="text"
            class="node-browser-search-input"
            [value]="nodeFilterPattern"
            (input)="onNodeFilterInput($event)"
            placeholder="Buscar nodo..."
          />
        </label>
        <select
          class="node-browser-list"
          multiple
          size="14"
          (change)="onNodeListSelectionChange($event)"
          aria-label="Nodos del grupo actual"
        >
          <option
            *ngFor="let nodeName of filteredCurrentSvgNodeNames"
            [value]="nodeName"
            [selected]="isNodeSelected(nodeName)"
          >
            {{ nodeName }}
          </option>
        </select>
      </section>
    </div>
  </aside>

  <section #workspaceArea class="workspace-area" [attr.aria-label]="t(i18nKeys.shell.WORKSPACE_AREA_ARIA)">
    <canvas #workspaceCanvas class="workspace-canvas" width="2400" height="1600"></canvas>
  </section>

  <app-menu-renderer [searchPlaceholder]="t(i18nKeys.shell.MENU_SEARCH_PLACEHOLDER)"></app-menu-renderer>
</main>

<app-relation-dialog
  [visible]="relationBoxVisible"
  [text]="relationBoxText"
  [lines]="relationBoxLines"
  [closeAriaLabel]="t(i18nKeys.shell.CLOSE_RELATION_BOX_ARIA)"
  (closeRequested)="closeRelationBox()"
  (endpointClicked)="onRelationEndpointClick($event)"
  (endpointContextMenuRequested)="onRelationEndpointContextMenu($event)"
  (lineCheckboxToggled)="onRelationLineCheckboxToggled($event)"
></app-relation-dialog>
