<main class="main-layout" [class.main-layout-collapsed]="isPanelCollapsed">
  <aside class="left-panel" [class.left-panel-collapsed]="isPanelCollapsed">
    <div class="panel-controls-row">
      <button class="panel-toggle-button" type="button" (click)="toggleSidePanel()" [attr.aria-expanded]="!isPanelCollapsed">
        {{ isPanelCollapsed ? '» ' + t(i18nKeys.shell.PANEL_LABEL) : '« ' + t(i18nKeys.shell.PANEL_COLLAPSE) }}
      </button>

      <button class="panel-toggle-button panel-back-button" type="button" (click)="backToStructure()" *ngIf="!isPanelCollapsed && !isInStructureMode()">
        {{ t(i18nKeys.shell.BACK_TO_STRUCTURE) }}
      </button>
    </div>

    <div class="panel-content" *ngIf="!isPanelCollapsed">
      <section class="generator-panel">
        <button
          class="generator-panel-bar"
          type="button"
          (click)="toggleGeneratorPanel()"
          [attr.aria-expanded]="!isGeneratorPanelCollapsed"
        >
          <span class="generator-panel-arrow">{{ isGeneratorPanelCollapsed ? '▸' : '▾' }}</span>
          <span class="generator-panel-title">{{ t(i18nKeys.shell.GRAPH_GENERATOR_TITLE) }}</span>
        </button>

        <div class="generator-panel-content" *ngIf="!isGeneratorPanelCollapsed">
          <div class="panel-header-row">
            <div class="language-switch" [attr.aria-label]="t(i18nKeys.shell.LANGUAGE_SELECTOR_ARIA)">
              <button
                type="button"
                class="language-flag-button"
                [class.language-flag-button-active]="selectedLanguage() === 'es'"
                (click)="setLanguage('es')"
                aria-label="Spanish"
              >
                🇪🇸
              </button>
              <button
                type="button"
                class="language-flag-button"
                [class.language-flag-button-active]="selectedLanguage() === 'en'"
                (click)="setLanguage('en')"
                aria-label="English"
              >
                🇺🇸
              </button>
            </div>
          </div>

          <button class="action-button" type="button" (click)="analyzeDebianSystem()" [disabled]="isLoading">
            {{ t(i18nKeys.shell.ANALYZE_DEBIAN_SYSTEM) }}
          </button>

          <label class="project-selector-label">{{ t(i18nKeys.shell.CACHE_PROJECT_SELECTOR_LABEL) }}</label>
          <div class="project-action-row">
            <select
              class="project-selector project-selector-compact"
              [value]="selectedCachedProjectId"
              (change)="onCachedProjectSelectionChange($event)"
              [disabled]="isLoading || cachedProjects.length === 0"
            >
              <option *ngFor="let project of cachedProjects" [value]="project.id">{{ project.name }}</option>
            </select>

            <button
              class="action-button action-button-icon"
              type="button"
              (click)="createGraphFromCache()"
              [disabled]="isLoading"
              [attr.aria-label]="t(i18nKeys.shell.CREATE_GRAPH_FROM_CACHE)"
              title="Crear grafo desde cache.txt"
            >
              ↑
            </button>
          </div>

          <label class="project-selector-label">{{ t(i18nKeys.shell.CPP_PROJECT_SELECTOR_LABEL) }}</label>
          <div class="project-action-row">
            <select
              class="project-selector project-selector-compact"
              [value]="selectedCppProjectId"
              (change)="onCppProjectSelectionChange($event)"
              [disabled]="isLoading || cppProjects.length === 0"
            >
              <option *ngFor="let project of cppProjects" [value]="project.id">{{ project.name }}</option>
            </select>

            <button
              class="action-button action-button-icon"
              type="button"
              (click)="analyzeCppSources()"
              [disabled]="isLoading || cppProjects.length === 0 || !selectedCppProjectId"
              [attr.aria-label]="t(i18nKeys.shell.ANALYZE_CPP_SOURCES)"
              title="Analizar fuentes C/C++"
            >
              ↑
            </button>
          </div>

          <label class="project-selector-label">{{ t(i18nKeys.shell.JAVA_PROJECT_SELECTOR_LABEL) }}</label>
          <div class="project-action-row">
            <select
              class="project-selector project-selector-compact"
              [value]="selectedJavaProjectId"
              (change)="onJavaProjectSelectionChange($event)"
              [disabled]="isLoading || javaProjects.length === 0"
            >
              <option *ngFor="let project of javaProjects" [value]="project.id">{{ project.name }}</option>
            </select>

            <button
              class="action-button action-button-icon"
              type="button"
              (click)="analyzeJavaSources()"
              [disabled]="isLoading || javaProjects.length === 0 || !selectedJavaProjectId"
              [attr.aria-label]="t(i18nKeys.shell.ANALYZE_JAVA_SOURCES)"
              title="Analizar fuentes Java"
            >
              ↑
            </button>
          </div>

          <p class="status-line" *ngIf="isLoading">{{ t(i18nKeys.shell.PROCESSING) }}</p>
          <p class="status-line status-line-error" *ngIf="errorMessage">{{ errorMessage }}</p>
          <p class="status-line" *ngIf="graphModel">
            {{ t(i18nKeys.shell.NODES) }}: {{ graphModel.nodes.length }} | {{ t(i18nKeys.shell.EDGES) }}:
            {{ graphModel.edges.length }}
          </p>
        </div>
      </section>

      <section class="node-browser-panel">
        <label class="node-browser-search" aria-label="Filtrar nodos del grupo">
          <span class="node-browser-search-icon">🔍</span>
          <input
            type="text"
            class="node-browser-search-input"
            [value]="nodeFilterPattern"
            (input)="onNodeFilterInput($event)"
            [placeholder]="isInStructureMode() ? t(i18nKeys.shell.FILTER_GROUP_PLACEHOLDER) : t(i18nKeys.shell.FILTER_NODE_PLACEHOLDER)"
          />
        </label>
        <select
          class="node-browser-list"
          multiple
          size="14"
          (change)="onNodeListSelectionChange($event)"
          (contextmenu)="onNodeListContextMenu($event)"
          aria-label="Nodos del grupo actual"
        >
          <option
            *ngFor="let nodeName of filteredCurrentSvgNodeNames"
            [value]="nodeName"
            [selected]="isNodeSelected(nodeName)"
          >
            {{ nodeName }}
          </option>
        </select>
      </section>
    </div>
  </aside>

  <section #workspaceArea class="workspace-area" [attr.aria-label]="t(i18nKeys.shell.WORKSPACE_AREA_ARIA)">
    <canvas #workspaceCanvas class="workspace-canvas" width="2400" height="1600"></canvas>
  </section>

  <app-menu-renderer [searchPlaceholder]="t(i18nKeys.shell.MENU_SEARCH_PLACEHOLDER)"></app-menu-renderer>
</main>

<app-relation-dialog
  [visible]="relationBoxVisible"
  [text]="relationBoxText"
  [lines]="relationBoxLines"
  [closeAriaLabel]="t(i18nKeys.shell.CLOSE_RELATION_BOX_ARIA)"
  (closeRequested)="closeRelationBox()"
  (endpointClicked)="onRelationEndpointClick($event)"
  (endpointContextMenuRequested)="onRelationEndpointContextMenu($event)"
  (lineCheckboxToggled)="onRelationLineCheckboxToggled($event)"
></app-relation-dialog>
